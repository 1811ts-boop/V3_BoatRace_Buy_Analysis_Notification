name: Daily BoatRace Scraper

on:
  schedule:
    # 毎日 日本時間 午前4時に実行 (UTC 19:00)
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas tqdm pytz google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Create Credentials JSON from Secret
      env:
        # ご用意いただいたシークレット名に変更済
        GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
      run: |
        echo "$GCP_SA_CREDENTIALS" > credentials.json

    - name: Run Scraper Script
      env:
        # ご用意いただいたシークレット名に変更済
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        python scraper.py
