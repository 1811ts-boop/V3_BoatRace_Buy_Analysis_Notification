name: Daily BoatRace Scraper

on:
  schedule:
    # 毎日 日本時間 午前4時に実行 (UTC 19:00)
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # 💡 v4にアップデート推奨

    - name: Set up Python
      uses: actions/setup-python@v5 # 💡 v5にアップデート推奨
      with:
        python-version: '3.12' # 💡 推論側とバージョンを合わせるのが安全です

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas tqdm pytz google-api-python-client google-auth-httplib2 google-auth-oauthlib

    # 💡 修正箇所: JSONファイルを作成するステップを削除し、直接スクリプトに環境変数を渡す
    - name: Run Scraper Script
      env:
        GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        python scraper.py
