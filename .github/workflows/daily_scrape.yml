name: Daily BoatRace Scraper

on:
  schedule:
    # UTC時間で指定 (UTC 19:00 = JST 04:00)
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas tqdm pytz google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Create Credentials JSON from Secret
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        echo "$GCP_SA_KEY" > credentials.json

    - name: Run Scraper Script
      env:
        DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
      run: |
        python scraper.py
