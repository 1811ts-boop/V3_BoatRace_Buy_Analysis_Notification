name: Daily LINE Batch Sender

on:
  schedule:
    # 毎日 日本時間の午前8時30分に実行 (UTC時間で前日の23:30)
    # ※V9〜V12の実行時間より"後"になるように調整してください
    - cron: '00 22 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  send-line-message:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Run LINE Sender Script
      env:
        GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      run: |
        python line_sender.py
