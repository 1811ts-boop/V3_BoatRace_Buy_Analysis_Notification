name: V3 & V5 & V6 & V7 Daily BoatRace AI

on:
  schedule:
    # 毎日日本時間 朝6:30 に実行（UTCで前日の21:30）
    - cron: '30 21 * * *'
  workflow_dispatch: # 手動実行用のボタン

jobs:
  run-ai-models:
    runs-on: ubuntu-latest
    timeout-minutes: 80 # 🛡️ 4モデル連続稼働のため、安全装置を80分に拡張

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------
      # 🚀 1つ目：従来のV3システムを実行
      # -----------------------------------------------
      - name: Run V3 Daily Script
        env:
          TZ: 'Asia/Tokyo'
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python main.py

      # -----------------------------------------------
      # 🚀 2つ目：V5システム（中穴EVスナイパー）を実行
      # -----------------------------------------------
      - name: Run V5 Daily Script
        if: always() # 🛡️ V3がコケても必ず実行
        env:
          TZ: 'Asia/Tokyo'
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python v5_main.py

      # -----------------------------------------------
      # 🚀 3つ目：V6システムを実行
      # -----------------------------------------------
      - name: Run V6 Daily Script
        if: always() # 🛡️ V3やV5がコケても必ず実行
        env:
          TZ: 'Asia/Tokyo'
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python V6_main.py  # ← 大文字・小文字など、実際のファイル名に正確に合わせてください

      # -----------------------------------------------
      # 🚀 4つ目：V7システム（2連複専用）を実行
      # -----------------------------------------------
      - name: Run V7 Daily Script
        if: always() # 🛡️ V3やV5やV6がコケても必ず実行
        env:
          TZ: 'Asia/Tokyo'
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python V7_DailyRun.py
