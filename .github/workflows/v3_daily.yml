name: V10 & V9 & V3 Daily BoatRace AI

on:
  schedule:
    # 毎日日本時間 朝6:30 に実行（UTCで前日の21:30）
    - cron: '30 21 * * *'
  workflow_dispatch: # 手動実行用のボタン

jobs:
  run-ai-models:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # 🛡️ 3モデル稼働のため、安全装置を90分に延長

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------
      # 🚀 1つ目：V10システム（条件付き確率 最新版）を実行
      # -----------------------------------------------
      - name: Run V10 Daily Script
        env:
          TZ: 'Asia/Tokyo'
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python V10_DailyRun_Batch.py

      # -----------------------------------------------
      # 🚀 2つ目：V9システム（LambdaRank ハイブリッド版）を実行
      # -----------------------------------------------
      - name: Run V9 Daily Script
        if: always() # 🛡️ V10がコケても必ず実行
        env:
          TZ: 'Asia/Tokyo'
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python V9_DailyRun_Batch.py

      # -----------------------------------------------
      # 🚀 3つ目：従来のV3システムを実行
      # -----------------------------------------------
      - name: Run V3 Daily Script
        if: always() # 🛡️ V9がコケても必ず実行
        env:
          TZ: 'Asia/Tokyo'
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_SA_CREDENTIALS }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python main.py
